{% extends 'base.html' %}
{% block title %}Update Doctor Details - Calicut Guide{% endblock %}

{% block content %}
<div class="page-title">Update Doctor Details</div>
<div class="glass-panel">
<form action="update_doctordetails" method="post"><div class="table-wrapper"><table class="modern-table">
  <tbody>
    <tr>
      <th scope="row">Doc Name</th>
      <td><input class="form-control" type="text" name="textfield2" id="textfield2" value="{{value[1]}}"></td>
    </tr>
    <tr>
      <th scope="row"><p>Specialization</p></th>
      <td><input class="form-control" type="text" name="textfield" id="textfield"  value="{{value[2]}}"></td>
    </tr>
    <tr>
      <th scope="row">Contact</th>
      <td><input class="form-control" type="text" name="tel" id="tel" maxlength="20" placeholder="e.g. 0495 272 0011" value="{{value[3]}}"></td>
    </tr>
    <tr>
      <th colspan="2" scope="row"><input type="submit" name="submit" id="submit" value="update" class="btn btn-primary" style="margin-top:1rem;"></th>
      </tr>
  </tbody>
</table></div>

  <p>&nbsp;</p>
</form>

</div>
{% endblock %}
