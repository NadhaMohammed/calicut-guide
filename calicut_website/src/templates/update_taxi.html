{% extends 'base.html' %}
{% block title %}Update Taxi - Calicut Guide{% endblock %}

{% block content %}
<div class="page-title">Update Taxi</div>
<div class="glass-panel">
<form action="update_taxi" method="post"><div class="table-wrapper"><table class="modern-table">
  <tbody>
    <tr>
      <th scope="row">Taxi type</th>
      <td>
        <select class="form-control" name="type" id="select" value="{{value[1]}}">
          <option>Auto</option>
          <option>car</option>
        </select></td>
    </tr>
    <tr>
      <th scope="row">Place</th>
      <td><input class="form-control" type="text" name="place" id="textfield" value="{{value[2]}}"></td>
    </tr>
    <tr>
      <th scope="row">Contact person</th>
      <td>
        <input class="form-control" type="text" name="contact_person" id="textfield2" value="{{value[3]}}"></td>
    </tr>
    <tr>
      <th scope="row">Contact no</th>
      <td><input class="form-control" type="text" name="contact_no" id="tel" maxlength="20" placeholder="e.g. 0495 272 0011" value="{{value[4]}}"></td>
    </tr>
    <tr>
      <th colspan="2" scope="row"><input type="submit" name="submit" id="submit" value="update" class="btn btn-primary" style="margin-top:1rem;"></th>
    </tr>
  </tbody>
</table></div>

	</form>

</div>
{% endblock %}
