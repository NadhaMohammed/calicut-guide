{% extends 'base.html' %}
{% block title %}Bus - Calicut Guide{% endblock %}

{% block content %}
<div class="page-title">Bus</div>
<div class="glass-panel">
<form action="add_bus" method="post"><div class="table-wrapper"><table class="modern-table">
  <tbody>
    <tr>
      <th width="114" scope="row"><p>Bus stop name</p></th>
      <td width="144"><input class="form-control" type="text" name="bus_name" id="textfield"></td>
    </tr>
    <tr>
      <th scope="row">Latitude</th>
      <td><input class="form-control" type="text" name="latitude" id="textfield2"></td>
    </tr>
    <tr>
      <th scope="row">Longitude</th>
      <td><input class="form-control" type="text" name="longitude" id="textfield3"></td>
    </tr>
    <tr>
      <th colspan="2" scope="row"><input type="submit" name="submit" id="submit" value="Submit" class="btn btn-primary" style="margin-top:1rem;"></th>
      </tr>
  </tbody>
</table></div>
  <p>&nbsp;</p>
  <p>&nbsp;</p>
  <div class="table-wrapper"><table class="modern-table">
    <tbody>
      <tr>
        <th scope="row">Bus Stop Name</th>
        <td>Latitude</td>
        <td>Longitude</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
      </tr>
       {%for i in value%}
      <tr>
        <th scope="row">&nbsp;{{i[1]}}</th>
        <td>&nbsp;{{i[2]}}</td>
        <td>&nbsp;{{i[3]}}</td>
        <td><a href="editbus?bus_id={{i[0]}}">edit</a></td>
        <td><a href="delbus?bus_id={{i[0]}}">delete</a></td>
      </tr>
    {%endfor%}
    </tbody>
  </table></div>
  <p>&nbsp;</p>
  <p>&nbsp;</p>
</form>

</div>
{% endblock %}
