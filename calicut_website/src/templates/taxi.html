{% extends 'base.html' %}
{% block title %}Taxi - Calicut Guide{% endblock %}

{% block content %}
<div class="page-title">Taxi</div>
<div class="glass-panel">
<form action="add_taxi" method="post"><div class="table-wrapper"><table class="modern-table">
  <tbody>
    <tr>
      <th scope="row">Taxi type</th>
      <td>
        <select class="form-control" name="type" id="select">
          <option>Auto</option>
          <option>car</option>
        </select></td>
    </tr>
    <tr>
      <th scope="row">Place</th>
      <td><input class="form-control" type="text" name="place" id="textfield"></td>
    </tr>
    <tr>
      <th scope="row">Contact person</th>
      <td>
        <input class="form-control" type="text" name="contact_person" id="textfield2"></td>
    </tr>
    <tr>
      <th scope="row">Contact no</th>
      <td><input class="form-control" type="text" name="contact_no" id="tel" maxlength="20" placeholder="e.g. 0495 272 0011"></td>
    </tr>
    <tr>
      <th colspan="2" scope="row"><input type="submit" name="submit" id="submit" value="Submit" class="btn btn-primary" style="margin-top:1rem;"></th>
    </tr>
  </tbody>
</table></div>
  <p>&nbsp;</p>
  <div class="table-wrapper"><table class="modern-table">
    <tbody>
      <tr>
        <th scope="row">Taxi Type</th>
        <td>Place</td>
        <td>Contact Person</td>
        <td>Contact No</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
      </tr>
      {%for i in value%}
      <tr>
        <th scope="row">&nbsp;{{i[1]}}</th>
        <td>&nbsp;{{i[2]}}</td>
        <td>&nbsp;{{i[3]}}</td>
        <td>&nbsp;{{i[4]}}</td>
        <td><a href="edittaxi?taxi_id={{i[0]}}">edit</a></td>
        <td><a href="deltaxi?taxi_id={{i[0]}}">delete</a></td>
      </tr>
    {%endfor%}

    </tbody>
  </table></div>
  <p>&nbsp;</p>

	</form>

</div>
{% endblock %}
