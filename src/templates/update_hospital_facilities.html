{% extends 'base.html' %}
{% block title %}Update Hospital Facilities - Calicut Guide{% endblock %}

{% block content %}
<div class="page-title">Update Hospital Facilities</div>
<div class="glass-panel">

<form id="form1" name="form1" action="update_hospital_facility" method="post">
  <div class="table-wrapper"><table class="modern-table">
    <tbody>
      <tr>
        <th height="40" scope="row">Facility</th>
        <td><textarea class="form-control" name="facility" id="textarea2" >{{value[1]}}</textarea></td>
      </tr>
      <tr>
        <th scope="row">Description</th>
        <td><textarea class="form-control" name="description" id="textarea" >{{value[2]}}</textarea></td>
      </tr>
      <tr>
        <th colspan="2" scope="row"><input type="submit" name="update" id="submit" value="update" class="btn btn-primary" style="margin-top:1rem;"></th>
      </tr>
    </tbody>
  </table></div>
</form>

</div>
{% endblock %}
