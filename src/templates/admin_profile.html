{% extends 'base.html' %}
{% block title %}My Profile - Calicut Guide{% endblock %}

{% block content %}
<div class="page-title">My Profile</div>

<div style="max-width: 600px;">
    <div class="glass-panel">

        <!-- Avatar / Icon Header -->
        <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--glass-border);">
            <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0; box-shadow: 0 4px 20px rgba(99,102,241,0.4);">
                <i class="fa-solid fa-user-tie"></i>
            </div>
            <div>
                <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem;">
                    {{ profile[0] if profile and profile[0] else 'Administrator' }}
                </h2>
                <span style="background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600; font-size: 0.9rem;">
                    <i class="fa-solid fa-shield-halved" style="-webkit-text-fill-color: var(--primary);"></i> Admin
                </span>
            </div>
        </div>

        <!-- Profile Form -->
        <form action="/update_admin_profile" method="post">

            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-id-card" style="margin-right:6px; color:var(--primary);"></i>Full Name</label>
                <input type="text" name="full_name" class="form-control"
                    placeholder="Enter your full name"
                    value="{{ profile[0] if profile and profile[0] else '' }}">
            </div>

            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-user" style="margin-right:6px; color:var(--primary);"></i>Username</label>
                <input type="text" name="username" class="form-control"
                    placeholder="Username"
                    value="{{ login[0] if login else '' }}" required>
            </div>

            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-envelope" style="margin-right:6px; color:var(--primary);"></i>Email</label>
                <input type="email" name="email" class="form-control"
                    placeholder="Enter your email"
                    value="{{ profile[1] if profile and profile[1] else '' }}">
            </div>

            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-phone" style="margin-right:6px; color:var(--primary);"></i>Phone Number</label>
                <input type="tel" name="phone" class="form-control"
                    placeholder="Enter your phone number"
                    value="{{ profile[2] if profile and profile[2] else '' }}">
            </div>

            <div style="border-top: 1px solid var(--glass-border); padding-top: 1.5rem; margin-top: 0.5rem;">
                <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem;">
                    <i class="fa-solid fa-lock" style="margin-right:6px;"></i>Leave password blank to keep your current password
                </p>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password" class="form-control" placeholder="Enter new password (optional)">
                </div>
            </div>

            <div style="margin-top: 1rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fa-solid fa-floppy-disk"></i> Save Changes
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
